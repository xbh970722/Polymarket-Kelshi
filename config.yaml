# ============================================================
# Kalshi 集成研究 + 交易流水线 全局配置
# mode: paper | live   (live 还需 live.enabled: true + API key)
# ============================================================
mode: live        # 2026-07-03 用户指令: $10 测试账户真钱练手 (超小仓位, 极其确定才加码)
platform: kalshi

# ---------- 模型编制 (换代升级只改这里, 代码零改动) ----------
ensemble:
  # 主AI/仲裁者: 会话层选择 — 有 Fable 额度时用 Fable 5, 用尽时切 Opus 4.8
  # (交互会话: /model 切换; 定时任务: 桌面端默认模型)
  arbiter_preference: [fable-5, opus-4.8]
  claude_family:
    count: 2
    model: opus            # Agent tool 的 model 参数: opus|sonnet|haiku|fable (未来: opus5 等)
    personas: [inside_view, outside_view]
  codex_family:
    count: 2
    model: gpt-5.5         # codex exec -m 参数 (未来: gpt-5.6 / codex-5.6 等)
    reasoning_effort: xhigh
  round2_representatives: 1   # 第二轮每家族代表数

# ---------- 交互协议 ----------
# 2026-07-03 起: 用户认知已固化到 research/VALUES.md, 系统全自动决策,
# 仲裁者每轮引用 VALUES.md 而非提问。仅 VALUES 未覆盖的全新决策类型才可提问。
interaction:
  when_interactive: auto
  ask_before_research: false
  ask_on_trade: false
  values_file: research/VALUES.md

# ---------- 决策前验证层 ----------
verification:
  enabled: true
  social: [twitter, reddit]     # agent-reach 通道: 下单前搜索近24h突发信息
  data: [fred, coinbase, official_calendars]  # 经济=FRED/官方日历, 加密=交易所数据
  rule: "任何 trade 信号在下单前必须过验证层; 发现模型未见的重大信息 -> 回炉重估"

domains:
  - Economics
  - Politics
  - Elections
  - World
  - Crypto
  - Financials
  - Companies
  - Science and Technology
  - Entertainment

scanner:
  max_pages: 25
  min_volume_24h: 500
  min_open_interest: 1000
  max_spread_cents: 6
  min_price_cents: 4
  max_price_cents: 96
  min_days_to_close: 0
  max_days_to_close: 45
  shortlist_size: 12

research:
  markets_per_cycle: 3

edge:
  min_edge_after_fees: 0.035       # 纸面阶段 3.5 点 (VALUES.md #2: 用交易换校准数据)
  live_min_edge_after_fees: 0.05   # 真钱阶段回升 5 点
  consensus_max_divergence: 0.10
  round2_half_anchor: true         # VALUES.md #3: 终值最多向市场价移动一半距离

sizing:
  bankroll_usd: 500
  kelly_fraction: 0.333            # VALUES.md #1: 娱乐预算, 1/3 Kelly

# ---------- 波段 / 退出管理 (VALUES.md #10) ----------
# 系统不再只买入持有到结算; 短期定价错误可波段: 机械止盈, 集成团队定期重判持有/修改/退出。
swing:
  enabled: true
  take_profit_capture: 0.6   # 止盈价 = 入场 + 0.6×(共识价 − 入场价), 捕获 60% 收敛空间即落袋
  min_target_move: 0.03      # 止盈目标离入场 <3 分则不值得波段 → 纯持有到结算
  stop_loss_frac: 0.5        # 机械止损 backstop: 现价(可卖出的bid)跌到入场价 50% 即认输
  review_after_days: 5       # 持仓 >5 天 → 交集成团队重判 (保留/改目标/退出)
  # (评审团清理: manage_intraday 为死旋钮已删 — 日内扫描频率由 quant_loop MARKS 决定)

risk:                      # ===== 硬限额: paper 和 live 都强制执行 =====
  max_per_trade_usd: 25
  max_daily_risk_usd: 999999   # 2026-07-04 深夜用户指令: 预算不设上限 (原100;
                               # 日投放闸全部解除, 风险由单笔/敞口/日亏熔断/余额兜底)
  max_total_exposure_usd: 300
  max_open_positions: 16           # 2026-07-03 用户指令: 仓位上限 +10 (原10)
  daily_loss_halt_usd: 200         # VALUES.md #1: 学费心态, 熔断放宽

# ---------- 真钱交易 (练手模式, VALUES.md #5a) ----------
live:
  enabled: true            # $10 测试账户, 用户 2026-07-03 明示授权全自动练手
  require_confirm: false   # 全自动; 保护 = 下方超小硬限额 (最大总敞口 $8)
  practice: true
  # 练手期风控: 账户仅 ~$9.7, 所有限额等比压缩; bankroll 由 decide 时实时查询余额
  max_per_trade_usd: 3.00        # 2026-07-04 对齐油门②: BTC/ETH 3张热门 ≈ $2.85 (原2.50)
  high_conviction_max_usd: 4.00  # "极其确定"单上限
  high_conviction:               # 极其确定的机器定义 (三条全满足):
    min_edge: 0.10               #   净优势 ≥10 个概率点
    max_family_divergence: 0.05  #   两家族终值分歧 ≤5 点
    require_all_estimators: true #   四个盲估者与市场价同方向 (需 research JSON 提供 q_all)
  live_min_edge_after_fees: 0.035  # 练手期与纸面同门槛, 攒真实成交经验; 正式期回 0.05
  max_daily_risk_usd: 999999     # 2026-07-04 深夜用户指令: 预算不设上限 (原6);
                                 # 注意这是"当日累计投放"闸, 不是亏损闸 — 亏损闸保留在下方 $5
  max_total_exposure_usd: 60     # 2026-07-06 用户: 20→60 (充值后余额$66, 沿用
                                 # "≈全余额"先例但留 ~$6 缓冲给 h15 挂单保证金,
                                 # 免得敞口帽和挂单互相卡死; 07-05 先例: 20≈$18.92)
  max_open_positions: 16         # 2026-07-03 用户指令: +10 (原6); 美元上限不变
  daily_loss_halt_usd: 12        # 2026-07-06 用户: 8→12 ("刹车换到12刀") — 配套
                                 # 三币×3后的单日尾部空间 (三笔×3死单≈-$7.9 不再
                                 # 一天即熔断); 同一数字约束已实现与mtm两条熔断
  # 分币×3后的最坏单窗尾部: ETH+SOL+XRP+BTC 同刻同向全死 ≈ -$8.8 (帽内)
  # API key 配置 (环境变量, 不进 git):
  #   KALSHI_API_KEY_ID=<key id>
  #   KALSHI_PRIVATE_KEY_PATH=<RSA 私钥 .pem 路径>
  # 获取: kalshi.com -> Account -> API Keys -> Create; 验证: python -m src.pipeline live-check

# ---------- 短波量化通道 (小时级, 无LLM, VALUES.md #11) ----------
shortcycle:
  enabled: true
  series: [KXBTCD, KXETHD, KXSOLD, KXXRPD]   # 油门③: 滞后通道全 4 币覆盖 (2026-07-04)
  # 15分钟涨跌盘已停用 (2026-07-03 数据裁决): v24h=0 无对手盘, 50c处费率4%最狠,
  # 信噪比全通道最差, 实战1笔亏$0.06。代码保留, 改回 [KXBTC15M,KXETH15M,KXSOL15M] 即复活。
  # 注: H5 校准记录器 (src/mktcal.py) 仍免费采样这些市场, 停交易不丢数据。
  series_15m: []
  # 确定性区间设计 (research/SHORTCYCLE_DESIGN.md): 参考价 = 上一窗口精确结算值;
  # 只在方向近乎锁定时出手, 永久禁入掷硬币区
  min_minutes_15m: 2
  max_minutes_15m: 6
  certainty_band: [0.22, 0.78]   # q 落在带内 = 掷硬币区, 直接跳过
  min_edge_by_series:
    KXETHD: 0.05                 # ETH 价差 3c, 门槛相应更高
    KXSOLD: 0.05                 # SOL/XRP 书更薄, 同 ETH 门槛
    KXXRPD: 0.06
    KXBTC15M: 0.04               # 15m盘: 费用占比高 + 指数基差, 门槛 4 点
    KXETH15M: 0.05
    KXSOL15M: 0.05
  min_minutes_to_close: 15
  max_minutes_to_close: 75
  # ===== 2026-07-03 复盘改刀 (0/16 惨案, 见 SHORTCYCLE_DESIGN.md 复盘节) =====
  lag_only: true                 # 只做"模型比市场更确定"的滞后单, 永禁淡化市场把握
  lag_margin: 0.02
  vol_lookback_min: 180          # (已弃用: 小时通道改用 EWMA 波动率)
  min_edge_after_fees: 0.03      # 果断化: 4→3 点 (用户: 策略果断点) — 安全门, 不动
  slippage: 0.01                 # 果断化: 允许越价 1c 吃单 (越价后仍须过门槛)
  max_per_trade_usd: 1.00        # 2026-07-04 提量 (原0.50)
  max_contracts: 5               # 原3
  daily_budget_usd: 999999       # 2026-07-04 深夜用户指令: 预算不设上限 (原4.00)
  budget_extra:                  # 一次性追加预算 (自动过期): 旧策略烧超后, 给新策略的当日弹药
    date: "2026-07-03"
    usd: 2.00                    # 用户: "新策略给2刀"

# ---------- crypto 双条件止损 (用户 2026-07-05 晨 提前实盘) ----------
# 影子一夜 3 事件 2 确认: 两笔 BTC ×3 尾部本可各救回半仓+ (~$2.95)。用户在第二笔
# 死亡前 ~1h 预判并拍板提前上线。双条件 = 价格触线 AND 现货证实 (穿越或贴线):
# 纯盘口砸盘 (现货未动) 不触发 — 防猎杀设计 (VALUES 5e)。影子继续并行记录全部
# 穿越事件 (含假触发率), 周末对账校准参数。
# ---------- 宏观事件窗 (R8-C3: 风暴协议最小实现; C4 的 VERIFIED 日历) ----------
# 窗内 (UTC): favorites/h10 live/h15 新挂单 全部停开; 撤单/成交管理/止损照常;
# 止损贴线带宽自动切到 storm 档。影子采集器全程照跑 (风暴样本正是最缺的)。
macro_windows:
  - ["2026-07-08T17:30:00Z", "2026-07-08T19:30:00Z"]   # FOMC Minutes (14:00 ET)
  - ["2026-07-14T12:00:00Z", "2026-07-14T14:00:00Z"]   # CPI Jun (08:30 ET)
  - ["2026-07-29T17:30:00Z", "2026-07-29T20:00:00Z"]   # FOMC 声明+发布会
  - ["2026-07-30T12:00:00Z", "2026-07-30T14:00:00Z"]   # PCE Jun
  - ["2026-08-07T12:00:00Z", "2026-08-07T14:00:00Z"]   # NFP Jul
  - ["2026-08-12T12:00:00Z", "2026-08-12T14:00:00Z"]   # CPI Jul
  - ["2026-08-19T17:30:00Z", "2026-08-19T19:30:00Z"]   # FOMC Minutes
  - ["2026-08-26T12:00:00Z", "2026-08-26T14:00:00Z"]   # PCE Jul

crypto_stop:
  enabled: true
  bid_trigger: 0.70              # 持仓侧 bid 触线
  spot_proximity_pct: 0.05       # 现货在 strike ±0.05% 内 = "贴线即不确定"
  storm_proximity_pct: 0.10      # R8: 宏观窗内自动切换 (C4 风暴梯)
                                 # (今晚两笔触发时现货都贴线上方, 纯穿越判定会漏)
  exit_cross: 0.02               # 卖出限价 = bid - 2c (确保快市成交)

# ---------- 亏损触发式复盘 (用户: 每亏几笔自动复盘, Fable 5 总领) ----------
crypto_review:
  enabled: true
  loss_count_trigger: 5          # 自上次复盘起 crypto 结算亏损 ≥5 笔 -> 触发
  loss_usd_trigger: 1.00         # 或累计新增亏损 ≥$1 -> 触发
  cooldown_hours: 2              # 复盘冷却, 防连环触发
  # (评审团清理: reviewer_model 为死旋钮已删 — 复盘由监工任务执行, 模型=桌面端默认)

# ---------- 热门收割通道 (2026-07-03 用户: 现在就用真钱低额开) ----------
# 收割 favorite-longshot bias: 买"热门那一侧"(不管YES/NO), 方向中性防单边污染。
# 数据仅43样本尚未证实, 用户明示先小额实战; 亏损触发自动复盘/熔断。
favorites:
  enabled: true
  # 2026-07-04 用户批准扩到 4 币 (每小时上限 2→4 笔)。SOL 3.1万手/日充足,
  # XRP 6.5千勉强; DOGE/BNB/HYPE 死盘不碰。相关性尾巴 ~-$7/暴动小时,
  # 由 $3 回撤复盘中途拦截 (实测过的刹车)。
  series: [KXBTCD, KXETHD, KXSOLD, KXXRPD]
  zone: [0.84, 0.94]             # 2026-07-04 用户开油门①: 底 0.86→0.84 (校准 854 样本
                                 # 证 0.80-0.85 段仍 +2.7pt; 当初抬底防滑点的理由已被 H7 消除)
  # 2026-07-04 crypto review #2: 底 0.85→0.86。#45(-$1.7)与#30 成交在 0.83-0.84,
  # 低于原 0.85 底 (~1c 泄漏); 抬底 1c 让有效底回到意图值。校准(567快照)证实
  # favorite-longshot 偏差在 0.80-0.85 仍 +2.7pt, 故非结构改动, 仅堵泄漏。见 H6。
  # 2026-07-04 crypto review #3: 顶 0.95→0.94 (与 #2 对称)。#52(-$1.93) 成交在 0.96,
  # 高于 0.95 顶 (~1c 泄漏): 门槛 (pipeline.py:414) 校验扫描 ask, 但 IOC(:429) 实际
  # 成交可上滑 1c。band 数据: 0.94-0.97 共 6 单净 -$1.49 (96c NO 冒 96 博 4, 一翻即毁),
  # 而 0.88-0.94 核心 14 单 0 亏 +$2.09。降顶 1c 让有效顶回到意图 ~0.95。见 H6。
  tau_window_min: [5, 90]        # 2026-07-05 时点解剖: tau(5,10] 偏差 +8.4pt 为
                                 # 全场最肥箱 (n=74), 原下限 10 恰好禁着它;
                                 # :50 全量刻 tau~9.7 现成覆盖
  max_contracts: 2               # 基准 2 张; BTC/ETH 深书可 3 张 (油门②, 见 per_series)
  max_contracts_by_series:       # 2026-07-04 用户开油门②
    KXBTCD: 1                    # 2026-07-05 晨用户: 降额 (当日两笔×3尾部 -2.46/-2.69,
                                 # 第二笔用户提前~1h预判 — 见设计文档"用户预判记录")
    KXETHD: 3
    KXSOLD: 3                    # 2026-07-06 用户: ×3 (实盘14/14全胜, 每张+9.8c)
    KXXRPD: 3                    # 2026-07-06 用户: ×3, 撤销07-05降权 (实盘17/17
                                 # 全胜每张+11.2c 压过旧回测的-$2.16; 但 live n
                                 # 仍小, +200窗口复议条款保留)
  max_per_trade_usd: 3.00        # 3张×~94c 上限配套 (原2.00)
  z_floor: 0.8                   # 2026-07-06 BTC复盘: 入场时现货距strike须 >=
                                 # 0.8×(σ√τ) 才买 (O1 预注册值)。三笔BTC死单全部
                                 # z<0.8; 全币种 z<1 桶净 -$4.17 vs z>=1 +$9.87。
                                 # T型strike适用; 区间桶跳过; 数据故障 fail-open
  sigma_1h:                      # 各币小时实现波动率 (07-06 复盘冻结, 30d 样本;
    KXBTCD: 0.0029               # 待 regime 施工波接管后改为滚动计算)
    KXETHD: 0.0035
    KXSOLD: 0.0039
    KXXRPD: 0.0052
  daily_budget_usd: 999999       # 2026-07-04 深夜用户指令: 预算不设上限 (原$15 诚实口径,
                                 # 只挡了半天)。风险兜底改为: 单笔$3 + 敞口$12 + 日亏$5熔断
                                 # + $3回撤步复盘 + 余额本身; 复盘不得擅自恢复预算上限
  max_open: 8                    # 2026-07-04 用户"123": 5→8 (4币时段打满; 全局$5熔断兜底)
  # (R3-FABLE: max_per_window 旋钮已删 — 每窗口一仓由代码硬编码, 改这里没有效果)
  # 2026-07-03 用户: 熔断线 $3, 且熔断=复盘调整后继续 (不是终点)。
  # 每亏 $3 触发一次复盘 -> Fable5 调策略 -> 继续下单 -> 再亏 $3 再复盘, 循环。
  drawdown_step_usd: 3.00        # 每段回撤额度
  hard_stop_steps: 5             # 连续 5 段 ($15) 仍未转正 -> 真正停用, 通知用户

# ---------- H10: 15m 热门收割 (影子+微额探针, 七席评审团仲裁 2026-07-05) ----------
# 仲裁: 5×MODIFIED-GO 1×NO-GO 1×NEED-MORE-DATA -> 不开正式通道; 影子账本立即跑
# (每次扫描记录真实可执行ask, 即预注册门的测量仪), 用户授权 ETH 微额自动探针
# (只回答成交现实, 不作EV证据)。预注册判据: 影子 n>=150 且净EV>=+5c 提案快GO;
# n>=300 且 >=+2c 慢GO; n>=150 且 <=0 处决。BTC 排除 (tau>6 无散户对手盘)。
h10:
  enabled: true
  series_shadow: [KXBTC15M, KXETH15M, KXSOL15M]   # BTC 进影子监视 (2026-07-05):
                                 # tau>6 现无散户对手盘, 微观结构变了数据会报告
  series_live: [KXETH15M, KXSOL15M]  # 用户 2026-07-05: ETH 放开笔数限制 (探针1/1
                                 # 后转常驻微通道); SOL 准入但连输 2 把即停转影子
  zone: [0.84, 0.94]
  tau_window_min: [6, 16]
  max_contracts: 1               # 最低额度不变 (用户明示): 单张
  max_per_trade_usd: 1.00
  consec_loss_stop:              # 用户 2026-07-05: 连续输 N 把 -> 该币停掉转影子
    KXSOL15M: 2                  # (写 data/h10_stop_KXSOL15M.json; 复盘删文件重启)
  drawdown_step_usd: 3.00        # R7-FABLE: 粘贴事故修复 — 此键此前被吸进 h15 块,
  hard_stop_steps: 1             # h10 裸奔在代码默认值上 (数值恰同, 正确性靠运气)
  final6:                        # H13 (用户直觉 2026-07-05): BTC 的量全在最后6分钟
    series: [KXBTC15M]           # -> 收盘锁定收割影子。历史: 697窗口 0.94+ 带
    tau_window_min: [0.5, 6]     # 报价.991 实胜1.000; :11/:26/:41/:56 四个闲置
    zone: [0.94, 0.985]          # mark 正好落在 tau~4min。判据见 SHORTCYCLE_DESIGN

# ---------- H15: 15m 挂单收割 (maker, 用户拍板 2026-07-05 "现在就建") ----------
# 回测 (1600窗口/10天): 挂0.84 → 102成交/天, 胜率91.3%, +7.3c/张 (maker零费),
# 最坏日全正。从"追逐转瞬即逝的ask"改为"守在bid上等恐慌盘撞进来"——H12 研究里
# +17.1c 利润的真正主人就是这个位置; 天然免疫猎杀 (砸盘者砸进来的单 87.5% 是错的)。
# 实盘微额的唯一使命: 测队列位置真相 (print打到价位 != 轮到我们成交)。
h15:
  enabled: true
  series: [KXETH15M]             # ETH 优先 (回测 98.7% 胜率); SOL 待 ETH 数据后复议
  bid: 0.84
  place_tau_min: [5.5, 16]       # R7-C6: 下界须高于 cancel_tau (4.5) — 不许在
                                 # 自己的撤单带内开新挂单
  cancel_tau_min: 4.5            # R7-C3: 原 2 分钟在 mark 节奏下不可达 (mark 只在
                                 # tau~10/~4 造访) → 改到 tau~4 的 mark 可靠执行;
                                 # 交易所侧 expiration_ts=close-120s 做崩溃保险
  min_fav_mid: 0.86              # 热门中值须高于此才挂 (否则等于吃单越价)
  max_contracts: 3               # 2026-07-06 用户拍板×3 (11/20 笔全胜后, 用户
  max_per_trade_usd: 3.00        # 专属杠杆)。注册簿注记: 成交 #1-11 = x1,
                                 # #12 起 = x3 — 队列门按成交事件计, 经济学
                                 # 对比须分段。一笔 84c 死单在 x3 下 = -$2.52。
  max_fav_mid: 0.955             # R7-FABLE: 0.97+ 热门跌 13c 才成交 = 逆向选择
                                 # 最毒段; 带上界让队列数据对准 H12 回弹人群
  drawdown_step_usd: 3.00        # 独立回撤记账 (title h15maker); 首步 -$3 硬停
  hard_stop_steps: 1

# ---------- 天气通道 (每日, NWS 官方数据, 无LLM) ----------
weather:
  enabled: true
  series: [KXHIGHNY, KXHIGHCHI, KXHIGHAUS, KXHIGHMIA, KXHIGHLAX, KXHIGHDEN, KXHIGHPHIL]
  active_local_hours: [11, 21]   # 当地 11:00-21:00 才交易 (早晨预报噪声大)
  min_edge_after_fees: 0.05      # 预报基差风险真实存在, 门槛比 crypto 高
  max_per_trade_usd: 0.50
  max_contracts: 3
  max_trades_per_city_per_day: 1   # R6 三席会师 (C1/C3/C5): 同城多桶共享同一个
                                   # 结算值, 2单/城是假分散; 天气日界=一次天气注
  max_entries_per_day: 3           # R6-C1: 天区(synoptic)聚簇, 全天气族日新仓帽
  daily_budget_usd: 999999         # 2026-07-04 深夜用户指令: 预算不设上限 (原$3;
                                   # 天气实际节流阀 = 1单/城/天 × 7城 × 单笔$0.50)
                                   # 07-05 04:1x: 此行曾被 W2 粘贴事故挪进 wxfade_live
                                   # 块 -> cmd_weather KeyError 崩了一小时 (幸在交易
                                   # 时窗外, 零损失)。归位 + 交易时窗外也要盯崩溃。

# ---------- W2 彩票折价实弹 (用户 2026-07-05 晨: "更好的也OK, 贴着最低的来") ----------
# 提前开闸 (VALUES #14 先例: 统计证实前按用户意愿小额下注); wxfade 影子继续平行跑,
# 仍是最终裁判 (幸存<60% 照样归档)。66天回测: 买 .15-.40 报价桶的 NO, 20-48h 段
# 194-1 (99.5%) +$0.53/天 最坏日 -$0.40。城市日帽与 W1 共享 (title weather% 族计数)。
wxfade_live:
  enabled: true
  yes_band: [0.15, 0.40]         # fade 这个 YES 报价带 -> 买 NO
  tau_hours: [8, 48]             # 20-48h 历史最优; 8-20h 次之
  max_per_trade_usd: 0.90        # 用户"贴着最低": 1张 NO (0.60-0.87) + 费, 一分不多
  max_contracts: 1
  max_entries_per_day: 2         # 比家族帽(3)更紧: 新通道先用半油门
  price_floor: 0.55              # 新价复核下限: NO ask 崩到带外 = 形态失效不追

live_gate:                 # 建议性指标 (报告展示, 不再硬拦; 未达标时开 live 请三思)
  min_settled_trades: 30
  max_brier: 0.22
  # (R3-FABLE: require_positive_pnl 旋钮已删 — 无代码读取, 留着会误导)
